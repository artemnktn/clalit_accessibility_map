# Publishes the CRA build to GitHub Pages via the official Pages API (no git push to gh-pages).
# Requires repo secret: REACT_APP_MAPBOX_TOKEN (Mapbox public token).
#
# One-time repo setup: Settings → Pages → Build and deployment → Source: GitHub Actions
# (not “Deploy from a branch”). After the first successful run, the site URL appears there.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Require Mapbox token
        env:
          MAPBOX_TOKEN: ${{ secrets.REACT_APP_MAPBOX_TOKEN }}
        run: |
          if [ -z "$MAPBOX_TOKEN" ]; then
            echo "::error::Add repository secret REACT_APP_MAPBOX_TOKEN (Mapbox public token, pk.…)"
            exit 1
          fi

      - name: Build
        run: npm run build
        env:
          REACT_APP_MAPBOX_TOKEN: ${{ secrets.REACT_APP_MAPBOX_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
